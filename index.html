<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Metro Mayhem: NYC Transit Chronicles</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; }
        body { background: #111; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; width: 100vw; }
        #game-container { position: relative; width: 100%; max-width: 450px; height: 100%; max-height: 800px; background: #1a1a1a; overflow: hidden; box-shadow: 0 0 30px rgba(0,0,0,0.8); }
        canvas { display: block; width: 100%; height: 100%; background: #222; }
        #debug-ui { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.85); padding: 8px 12px; border-radius: 4px; font-family: monospace; font-size: 11px; color: #00ffcc; pointer-events: none; border: 1px solid #333; line-height: 1.4; z-index: 10; }
        #touch-controls { position: absolute; bottom: 0; left: 0; width: 100%; height: 100%; display: grid; grid-template-columns: 1fr 1fr; z-index: 5; }
        .touch-zone { height: 100%; cursor: pointer; background: rgba(255, 255, 255, 0); }
    </style>
</head>
<body>

<div id="game-container">
    <div id="debug-ui">
        FPS: <span id="debug-fps">0</span><br>
        ACTIVE OBSTACLES: <span id="debug-obs-count">0</span><br>
        GAME SPEED: <span id="debug-speed">1.00</span><br>
        VP CONFIG: <span id="debug-res">0x0</span>
    </div>

    <div id="touch-controls">
        <div class="touch-zone" id="left-zone"></div>
        <div class="touch-zone" id="right-zone"></div>
    </div>

    <canvas id="gameCanvas"></canvas>
</div>

<script type="module" src="./src/game.js"></script>

</body>
</html>
